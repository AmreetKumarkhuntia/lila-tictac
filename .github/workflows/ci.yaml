name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install nakama dependencies
        run: npm --prefix nakama install

      - name: ESLint
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Typecheck nakama
        run: npm --prefix nakama run type-check

      - name: Prettier check
        run: npm run format:check
