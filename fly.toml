app = "lila-tictac-nakama"
primary_region = "sjc"

[build]
  dockerfile = "nakama/Dockerfile"

[http_service]
  internal_port = 7350
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 7351

  [[services.ports]]
    port = 7351

[env]
  NAKAMA_LOG_LEVEL = "INFO"

[deploy]
  strategy = "immediate"
